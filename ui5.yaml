specVersion: "3.1"
metadata:
  name: cus.fi.timi.rel
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false
        backend:
          - path: /sap
            url: http://devfiori.sanofi.com:443
            client: "100"
            destination: sanofi-azure-DO8-100
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_fiori_3
          path: test/flpSandbox.html
          intent:
            object: app
            action: tile
