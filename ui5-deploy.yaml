# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: cus.fi.timi.rel
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: sanofi-azure-DO8-100
          url: http://fiorid.sanofi.com:443
          client: '100'
        app:
          name: YFI062_TIMI_REL
          description: TIMI - Related Third Party
          package: YTIMI
          transport: DO8K908536
        exclude:
          - /test/
